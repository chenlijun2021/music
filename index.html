<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>意识流·声影艺术家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400&display=swap');
        
        body {
            background-color: #faf9f6;
            margin: 0;
            overflow: hidden;
            font-family: 'Noto Sans SC', sans-serif;
        }

        canvas {
            display: block;
        }

        /* 艺术家风格的UI */
        .artist-panel {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
        }

        .slider-custom {
            -webkit-appearance: none;
            height: 2px;
            background: #e5e5e5;
            outline: none;
        }

        .slider-custom::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #000;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .slider-custom::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* 仿纸张纹理 (CSS层叠增强视觉) */
        .paper-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.03;
            background-image: url('https://www.transparenttextures.com/patterns/stucco.png');
            z-index: 5;
        }

        /* 引导点击的呼吸效果 */
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.15); opacity: 0.2; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
        .mic-pulse {
            animation: pulse-ring 2s infinite ease-in-out;
        }
    </style>
</head>
<body>

    <div class="paper-overlay"></div>

    <canvas id="artCanvas"></canvas>

    <!-- 艺术家调整面板 (可收缩) -->
    <footer id="uiFooter" class="fixed bottom-10 left-1/2 z-20 w-[90%] max-w-3xl transition-transform duration-700 ease-in-out" style="transform: translate(-50%, 0);">
        <!-- 面板收缩按钮 -->
        <button id="togglePanelBtn" class="absolute -top-10 left-1/2 -translate-x-1/2 w-16 h-10 bg-white/85 backdrop-blur-md rounded-t-2xl flex items-center justify-center text-neutral-400 hover:text-black transition-colors border border-b-0 border-neutral-100 shadow-[0_-5px_15px_rgba(0,0,0,0.03)] cursor-pointer">
            <i data-lucide="chevron-down" id="toggleIcon" class="w-5 h-5 transition-transform duration-500"></i>
        </button>

        <div class="artist-panel rounded-3xl p-6 flex flex-col gap-5">
            
            <div class="flex items-center justify-between gap-6">
                <!-- 主按钮 (集成启停逻辑) -->
                <div class="relative flex items-center justify-center">
                    <div id="pulseBg" class="absolute w-20 h-20 bg-black/5 rounded-full mic-pulse pointer-events-none"></div>
                    <button id="startBtn" class="relative z-10 flex items-center justify-center w-14 h-14 bg-black text-white rounded-full transition-all hover:scale-105 active:scale-95 shadow-xl shadow-black/10">
                        <i data-lucide="mic" id="micIcon" class="w-6 h-6 text-white transition-all"></i>
                    </button>
                </div>

                <!-- 参数控制组 -->
                <div class="flex-1 grid grid-cols-2 gap-x-8 gap-y-3">
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] uppercase tracking-widest text-neutral-500 font-medium flex justify-between">
                            基准线宽 <span id="weightLabel">1.2</span>
                        </label>
                        <input type="range" id="weightSlider" min="0.5" max="8.0" step="0.1" value="1.2" class="slider-custom w-full">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] uppercase tracking-widest text-neutral-500 font-medium flex justify-between">
                            灵感阈值 <span id="threshLabel">15</span>
                        </label>
                        <input type="range" id="threshSlider" min="5" max="50" step="1" value="15" class="slider-custom w-full">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] uppercase tracking-widest text-neutral-500 font-medium flex justify-between">
                            绘画速度 <span id="paintSpeedLabel">0.6</span>
                        </label>
                        <input type="range" id="paintSpeedSlider" min="0.1" max="4.0" step="0.1" value="0.6" class="slider-custom w-full">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] uppercase tracking-widest text-neutral-500 font-medium flex justify-between">
                            推进速度 <span id="scrollSpeedLabel">1.5</span>
                        </label>
                        <input type="range" id="scrollSpeedSlider" min="-5.0" max="5.0" step="0.1" value="1.5" class="slider-custom w-full">
                    </div>
                </div>

                <!-- 重新开始 & 导出媒体 -->
                <div class="flex items-center gap-1.5">
                    <button id="clearBtn" class="w-9 h-9 flex items-center justify-center text-neutral-400 hover:text-black transition-colors" title="重置画布与录音">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                    </button>
                    <!-- 音频保存按钮 -->
                    <button id="saveAudioBtn" class="w-9 h-9 flex items-center justify-center text-neutral-300 hover:text-emerald-600 transition-colors" title="需先停止创作，即可保存本次原声">
                        <i data-lucide="music" class="w-4 h-4"></i>
                    </button>
                    <!-- 新增：视频保存按钮 -->
                    <button id="saveVideoBtn" class="w-9 h-9 flex items-center justify-center text-neutral-300 hover:text-emerald-600 transition-colors" title="需先停止创作，即可保存本次创作视频">
                        <i data-lucide="video" class="w-4 h-4"></i>
                    </button>
                    <!-- 画作保存按钮 -->
                    <button id="saveBtn" class="w-9 h-9 flex items-center justify-center text-neutral-400 hover:text-black transition-colors" title="保存最终艺术画作">
                        <i data-lucide="download" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <!-- 艺术家心流状态与灵感指示条 -->
            <div class="flex items-center justify-between text-[10px] text-neutral-400 tracking-wider">
                <span id="artistStateText">艺术家正在沉思...</span>
                <span id="flowEnergyLabel">能量: 0%</span>
            </div>
            <div class="w-full h-[2px] bg-neutral-100 relative rounded-full overflow-hidden">
                <div id="intensityBar" class="absolute top-0 left-0 h-full bg-black transition-all duration-100" style="width: 0%"></div>
            </div>
        </div>
    </footer>

    <!-- 自定义信息弹窗 -->
    <div id="infoModal" class="fixed inset-0 bg-neutral-950/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-300">
        <div class="bg-white max-w-md w-full rounded-3xl p-8 shadow-2xl border border-neutral-100 transform translate-y-4 transition-all duration-300" id="infoBox">
            <div class="flex items-center gap-3 text-neutral-900 mb-4">
                <i data-lucide="info" class="w-6 h-6" id="modalIcon"></i>
                <h3 class="text-lg font-medium" id="modalTitle">提示</h3>
            </div>
            <p id="infoText" class="text-sm text-neutral-500 leading-relaxed mb-6">
                这里是提示信息的内容。
            </p>
            <button id="closeModalBtn" class="w-full py-3 bg-neutral-900 text-white rounded-xl text-sm font-medium hover:bg-neutral-800 transition-colors">
                我知道了
            </button>
        </div>
    </div>

    <script>
        // --- 容错式安全图标库初始化 ---
        function safeCreateIcons() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            } else {
                setTimeout(safeCreateIcons, 100);
            }
        }
        safeCreateIcons();

        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');
        let audioCtx, analyser, dataArray, source, stream;
        let isActive = false;

        // --- 多媒体录音/录像引擎变量 ---
        let audioRecorder, videoRecorder;
        let audioChunks = [], videoChunks = [];
        let audioBlob = null, videoBlob = null;
        let audioUrl = null, videoUrl = null;

        // --- 艺术家物理状态变量 ---
        let points = [];          
        let penX, penY;          
        let vx = 0, vy = 0;      
        let angle = 0;            
        
        let paintSpeed = 0.6;     
        let scrollSpeed = 1.5;    
        let cameraX = 0;          
        
        // --- 灵感心流与音乐解析 ---
        let flowEnergy = 0;       
        let artistState = 'idle'; 
        let stateTimer = 0;       
        let noiseOffset = 0;      
        let globalTime = 0;       

        let prevAverage = 0;      
        let beatInertia = 0;      
        let smoothedBass = 0;     
        let smoothedTreble = 0;   

        let strokeConfig = {
            weight: 1.2,
            threshold: 15         
        };

        // --- DPR 自适应高清渲染初始化 ---
        function initCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            resetArtist();
        }

        function resetArtist() {
            const dpr = window.devicePixelRatio || 1;
            penX = 150;
            penY = canvas.height / (2 * dpr); 
            vx = paintSpeed;
            vy = 0;
            angle = 0;
            cameraX = 0;
            points = [];
            flowEnergy = 0;
            artistState = 'idle';
            updateStateUI();
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();

        function showModal(title, msg, isError = false) {
            const modal = document.getElementById('infoModal');
            const box = document.getElementById('infoBox');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('infoText').textContent = msg;
            
            const icon = document.getElementById('modalIcon');
            if (isError) {
                icon.setAttribute('data-lucide', 'alert-circle');
                icon.classList.replace('text-neutral-900', 'text-amber-600');
            } else {
                icon.setAttribute('data-lucide', 'info');
                icon.classList.replace('text-amber-600', 'text-neutral-900');
            }
            safeCreateIcons();

            modal.classList.remove('opacity-0', 'pointer-events-none');
            box.classList.remove('translate-y-4');
        }

        document.getElementById('closeModalBtn').addEventListener('click', () => {
            document.getElementById('infoModal').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('infoBox').classList.add('translate-y-4');
        });

        // ==========================================
        // 核心多媒体录制引擎：同时捕获音频与画布视频
        // ==========================================
        async function setupAudio() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') await audioCtx.resume();

                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                isActive = true;

                audioChunks = [];
                videoChunks = [];

                // 1. 初始化纯音频录制 (用于保存MP3/WEBM音频)
                try {
                    audioRecorder = new MediaRecorder(stream);
                    audioRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                    audioRecorder.onstop = () => {
                        const mimeType = audioRecorder.mimeType || 'audio/webm';
                        audioBlob = new Blob(audioChunks, { type: mimeType });
                        audioUrl = URL.createObjectURL(audioBlob);
                        const btn = document.getElementById('saveAudioBtn');
                        btn.classList.replace('text-neutral-300', 'text-emerald-500');
                        btn.title = "点击下载本次创作的原声音乐";
                    };
                    audioRecorder.start();
                } catch(e) { console.warn("音频录制初始化失败"); }

                // 2. 初始化带声音的高清视频录制 (Canvas Stream + Audio Stream)
                try {
                    // 获取画布每秒 30 帧的高清视频流
                    const canvasStream = canvas.captureStream(30); 
                    
                    // 将麦克风的音频轨混流加入到视频流中
                    const combinedStream = new MediaStream([
                        ...canvasStream.getTracks(),
                        ...stream.getAudioTracks()
                    ]);

                    // 优先选择兼容性更好、质量更高的视频编码格式
                    const videoOptions = { mimeType: 'video/webm;codecs=vp9' };
                    if (!MediaRecorder.isTypeSupported(videoOptions.mimeType)) {
                        videoOptions.mimeType = 'video/webm'; // Fallback
                    }

                    videoRecorder = new MediaRecorder(combinedStream, videoOptions);
                    videoRecorder.ondataavailable = e => { if (e.data.size > 0) videoChunks.push(e.data); };
                    videoRecorder.onstop = () => {
                        const mimeType = videoRecorder.mimeType || 'video/webm';
                        videoBlob = new Blob(videoChunks, { type: mimeType });
                        videoUrl = URL.createObjectURL(videoBlob);
                        const btn = document.getElementById('saveVideoBtn');
                        btn.classList.replace('text-neutral-300', 'text-emerald-500');
                        btn.title = "点击下载本次创作的高清视频(带原声)";
                    };
                    videoRecorder.start();
                } catch(e) { console.warn("视频录制初始化失败 (部分浏览器可能不支持):", e); }

                // 重置下载按钮的UI状态
                document.getElementById('saveAudioBtn').classList.replace('text-emerald-500', 'text-neutral-300');
                document.getElementById('saveVideoBtn').classList.replace('text-emerald-500', 'text-neutral-300');
                if(audioUrl) { URL.revokeObjectURL(audioUrl); audioUrl = null; }
                if(videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }

                document.getElementById('pulseBg').classList.remove('mic-pulse');
                document.getElementById('pulseBg').classList.add('hidden');
                document.getElementById('startBtn').innerHTML = `<i data-lucide="square" id="micIcon" class="w-6 h-6 text-red-500 animate-pulse"></i>`;
                safeCreateIcons();

                animate();
            } catch (err) {
                showModal("音频唤醒遇阻", "请确保浏览器已允许本网页访问您的麦克风。", true);
            }
        }

        // 停止音频流与录像采集
        function stopAudio() {
            if (audioRecorder && audioRecorder.state !== 'inactive') audioRecorder.stop();
            if (videoRecorder && videoRecorder.state !== 'inactive') videoRecorder.stop();

            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            if (audioCtx) {
                audioCtx.close();
                audioCtx = null;
            }
            isActive = false;

            document.getElementById('pulseBg').classList.remove('hidden');
            document.getElementById('pulseBg').classList.add('mic-pulse');
            document.getElementById('startBtn').innerHTML = `<i data-lucide="mic" id="micIcon" class="w-6 h-6 text-white transition-all"></i>`;
            safeCreateIcons();

            flowEnergy = 0;
            artistState = 'idle';
            updateStateUI();
        }

        function updateStateUI() {
            const stateEl = document.getElementById('artistStateText');
            if (!isActive) {
                stateEl.innerText = "画笔已封存，等待下次灵感...";
                stateEl.className = "text-[10px] text-neutral-400 tracking-wider";
            } else if (flowEnergy < 0.05) {
                stateEl.innerText = "静听思绪中...";
                stateEl.className = "text-[10px] text-neutral-400 tracking-wider";
            } else if (beatInertia > 2.0) {
                stateEl.innerText = "激昂之境！顿挫飞溅";
                stateEl.className = "text-[10px] text-red-500 font-medium tracking-wider";
            } else if (artistState === 'scribble') {
                stateEl.innerText = "灵动之境：密集团绕涂鸦";
                stateEl.className = "text-[10px] text-neutral-800 font-medium tracking-wider";
            } else {
                stateEl.innerText = "深沉之境：舒展蔓延游走";
                stateEl.className = "text-[10px] text-neutral-700 tracking-wider";
            }
            document.getElementById('flowEnergyLabel').innerText = `能量: ${Math.round(flowEnergy * 100)}%`;
            document.getElementById('intensityBar').style.width = `${flowEnergy * 100}%`;
        }

        // --- 核心物理心流与画作生成引擎 ---
        function animate() {
            if (!isActive) return;

            analyser.getByteFrequencyData(dataArray);
            
            let sum = 0;
            let bassSum = 0, bassCount = 0;
            let trebleSum = 0, trebleCount = 0;

            for(let i=0; i<dataArray.length; i++) {
                let val = dataArray[i];
                sum += val;
                if (i < 12) { bassSum += val; bassCount++; }           
                else if (i > 40) { trebleSum += val; trebleCount++; }  
            }
            
            let average = sum / dataArray.length;
            let bassAvg = bassCount > 0 ? bassSum / bassCount : 0;
            let trebleAvg = trebleCount > 0 ? trebleSum / trebleCount : 0;

            let volumeDelta = average - prevAverage;
            if (volumeDelta > 15 && average > strokeConfig.threshold) {
                beatInertia = Math.min(beatInertia + (volumeDelta / 10), 8.0);
            } else {
                beatInertia = Math.max(0, beatInertia - 0.15); 
            }
            prevAverage = average;

            smoothedBass += (bassAvg - smoothedBass) * 0.1;
            smoothedTreble += (trebleAvg - smoothedTreble) * 0.1;

            if (average > strokeConfig.threshold) {
                let chargeRate = (average - strokeConfig.threshold) / 20;
                flowEnergy = Math.min(1.0, flowEnergy + Math.max(0.1, chargeRate));
            } else {
                flowEnergy = Math.max(0, flowEnergy - 0.015); 
            }

            if (flowEnergy > 0.1) {
                globalTime += 0.05;
                stateTimer--;

                if (stateTimer <= 0) {
                    artistState = Math.random() < 0.5 ? 'scribble' : 'wander';
                    stateTimer = 40 + Math.floor(Math.random() * 80); 
                }

                let bassFactor = smoothedBass / 255;
                let trebleFactor = smoothedTreble / 255;

                let currentSpeed = paintSpeed * (1 + beatInertia * 0.3);
                let turnRatePerPixel = 0;
                let macroTurn = Math.sin(globalTime * 0.15) * (0.02 + bassFactor * 0.08);

                if (artistState === 'scribble') {
                    let styleCycle = Math.sin(globalTime * 0.25); 
                    if (styleCycle > 0.4) {
                        turnRatePerPixel = (0.35 + trebleFactor * 0.6) * Math.sign(Math.sin(globalTime * 1.1));
                    } else if (styleCycle < -0.4) {
                        turnRatePerPixel = (0.015 + bassFactor * 0.04) * Math.sign(Math.sin(globalTime * 0.6));
                    } else {
                        turnRatePerPixel = (trebleFactor * 0.35) + Math.sin(globalTime * 3) * 0.12;
                    }
                } else {
                    turnRatePerPixel = macroTurn + Math.sin(globalTime * 0.3) * (0.03 + bassFactor * 0.05); 
                }

                angle += turnRatePerPixel * (currentSpeed * 0.85);

                let targetVx = Math.cos(angle) * currentSpeed;
                let targetVy = Math.sin(angle) * currentSpeed;

                let jitterAmount = 0.03 + trebleFactor * 0.8;
                let handJitterX = Math.sin(globalTime * 17) * jitterAmount;
                let handJitterY = Math.cos(globalTime * 13) * jitterAmount;

                let smoothing = Math.max(0.05, 0.15 - (beatInertia * 0.02)); 
                vx += (targetVx - vx) * smoothing + handJitterX;
                vy += (targetVy - vy) * smoothing + handJitterY;

                cameraX += scrollSpeed;
                penX += scrollSpeed + vx;
                penY += vy;

                const dpr = window.devicePixelRatio || 1;
                const logicalWidth = canvas.width / dpr;
                const logicalHeight = canvas.height / dpr;

                let relativeX = penX - cameraX;
                if (relativeX < logicalWidth * 0.08) {
                    penX = cameraX + logicalWidth * 0.08;
                    vx = Math.abs(vx) * 0.8; 
                } else if (relativeX > logicalWidth * 0.92) {
                    penX = cameraX + logicalWidth * 0.92;
                    vx = -Math.abs(vx) * 0.8;
                }

                const verticalMargin = 100;
                if (penY < verticalMargin) {
                    let forceRatio = (verticalMargin - penY) / verticalMargin;
                    vy += forceRatio * 0.6;
                    let angleToCenter = Math.atan2(logicalHeight / 2 - penY, vx || 0.1);
                    angle += (angleToCenter - angle) * 0.06 * forceRatio;
                } else if (penY > logicalHeight - verticalMargin) {
                    let forceRatio = (penY - (logicalHeight - verticalMargin)) / verticalMargin;
                    vy -= forceRatio * 0.6;
                    let angleToCenter = Math.atan2(logicalHeight / 2 - penY, vx || 0.1);
                    angle += (angleToCenter - angle) * 0.06 * forceRatio;
                }

                let dynamicWeight = strokeConfig.weight * (1 + bassFactor * 1.5 + beatInertia * 0.5);
                points.push({ x: penX, y: penY, w: dynamicWeight });

            } else {
                if (artistState !== 'idle') {
                    points.push(null); 
                    artistState = 'idle';
                }
                vx *= 0.9;
                vy *= 0.9;
            }

            updateStateUI();
            draw();
            requestAnimationFrame(animate);
        }

        // --- 画布物理渲染 ---
        function draw() {
            // 【为了视频能够录制到背景，直接将纸张颜色和网格绘制到 Canvas】
            ctx.fillStyle = '#faf9f6';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const dpr = window.devicePixelRatio || 1;
            
            ctx.fillStyle = '#e5e5e3';
            for (let x = 0; x < canvas.width; x += 30 * dpr) {
                for (let y = 0; y < canvas.height; y += 30 * dpr) {
                    ctx.fillRect(x, y, 1 * dpr, 1 * dpr);
                }
            }

            if (points.length < 2) return;

            ctx.save();
            ctx.scale(dpr, dpr);
            ctx.translate(-cameraX, 0);

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = 'rgba(15, 15, 15, 0.9)'; 

            let p0 = points[0];
            let p1 = points[1];
            
            if (p0 && p1) {
                let lastMidX = p0.x;
                let lastMidY = p0.y;

                for (let i = 1; i < points.length - 1; i++) {
                    let p2 = points[i + 1];

                    if (!p1 || !p2) {
                        lastMidX = null;
                        p1 = p2;
                        continue;
                    }
                    if (lastMidX === null) {
                        lastMidX = p1.x;
                        lastMidY = p1.y;
                    }

                    let midX = (p1.x + p2.x) / 2;
                    let midY = (p1.y + p2.y) / 2;

                    ctx.beginPath();
                    ctx.moveTo(lastMidX, lastMidY);
                    ctx.quadraticCurveTo(p1.x, p1.y, midX, midY);
                    
                    ctx.lineWidth = p1.w || strokeConfig.weight; 
                    ctx.stroke();

                    lastMidX = midX;
                    lastMidY = midY;
                    p1 = p2;
                }
            }

            if (artistState !== 'idle' && points[points.length - 1]) {
                ctx.beginPath();
                let tipRadius = (points[points.length - 1].w * 0.6) + 1.5;
                ctx.arc(penX, penY, tipRadius, 0, Math.PI * 2);
                ctx.fillStyle = '#ef4444'; 
                ctx.fill();
            }

            ctx.restore();
        }

        // --- UI面板管理 ---
        let isPanelCollapsed = false;
        const uiFooter = document.getElementById('uiFooter');
        const toggleIcon = document.getElementById('toggleIcon');
        
        document.getElementById('togglePanelBtn').addEventListener('click', () => {
            isPanelCollapsed = !isPanelCollapsed;
            if (isPanelCollapsed) {
                uiFooter.style.transform = 'translate(-50%, calc(100% + 40px))';
                toggleIcon.style.transform = 'rotate(180deg)';
            } else {
                uiFooter.style.transform = 'translate(-50%, 0)';
                toggleIcon.style.transform = 'rotate(0deg)';
            }
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            if (!isActive) setupAudio();
            else stopAudio();
        });

        document.getElementById('weightSlider').addEventListener('input', (e) => {
            strokeConfig.weight = parseFloat(e.target.value);
            document.getElementById('weightLabel').innerText = strokeConfig.weight.toFixed(1);
        });

        document.getElementById('threshSlider').addEventListener('input', (e) => {
            strokeConfig.threshold = parseInt(e.target.value);
            document.getElementById('threshLabel').innerText = strokeConfig.threshold;
        });

        document.getElementById('paintSpeedSlider').addEventListener('input', (e) => {
            paintSpeed = parseFloat(e.target.value);
            document.getElementById('paintSpeedLabel').innerText = paintSpeed.toFixed(1);
        });

        document.getElementById('scrollSpeedSlider').addEventListener('input', (e) => {
            scrollSpeed = parseFloat(e.target.value);
            document.getElementById('scrollSpeedLabel').innerText = scrollSpeed.toFixed(1);
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            resetArtist();
            // 清理录音/视频缓冲
            if(audioUrl) { URL.revokeObjectURL(audioUrl); audioUrl = null; }
            if(videoUrl) { URL.revokeObjectURL(videoUrl); videoUrl = null; }
            document.getElementById('saveAudioBtn').classList.replace('text-emerald-500', 'text-neutral-300');
            document.getElementById('saveVideoBtn').classList.replace('text-emerald-500', 'text-neutral-300');
        });

        // --- 保存媒体交互 ---
        document.getElementById('saveAudioBtn').addEventListener('click', () => {
            if (isActive) {
                showModal("操作提示", "录制正在进行中！\n请先点击中间的红色方块按钮「停止创作」，随后系统会为您打包生成音频文件进行保存。");
                return;
            }
            if (!audioUrl) {
                showModal("未检测到录音", "暂无可用录音。\n请点击中央的麦克风按钮开启声音采集，进行一段创作后再保存。");
                return;
            }
            const ext = (audioRecorder && audioRecorder.mimeType.includes('mp4')) ? 'mp4' : 'webm';
            const link = document.createElement('a');
            link.download = `声影原声-${Date.now()}.${ext}`;
            link.href = audioUrl;
            link.click();
        });

        document.getElementById('saveVideoBtn').addEventListener('click', () => {
            if (isActive) {
                showModal("操作提示", "视频录制正在进行中！\n请先点击中间的红色方块按钮「停止创作」，随后系统会为您处理并生成高清视频。");
                return;
            }
            if (!videoUrl) {
                showModal("未检测到视频", "暂无可用视频。\n请点击中央的麦克风按钮进行一段创作后再点击保存。注意：部分老旧浏览器可能不支持视频采集功能。");
                return;
            }
            const ext = (videoRecorder && videoRecorder.mimeType.includes('mp4')) ? 'mp4' : 'webm';
            const link = document.createElement('a');
            link.download = `声影艺术录像-${Date.now()}.${ext}`;
            link.href = videoUrl;
            link.click();
        });

        // --- 保存画作 ---
        document.getElementById('saveBtn').addEventListener('click', () => {
            const dpr = window.devicePixelRatio || 1;
            const tempCanvas = document.createElement('canvas');
            
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tCtx = tempCanvas.getContext('2d');
            
            // 复制现有主画布内容（已包含底色和网格）
            tCtx.drawImage(canvas, 0, 0);

            const logicalWidth = canvas.width / dpr;
            const logicalHeight = canvas.height / dpr;

            tCtx.save();
            tCtx.scale(dpr, dpr);

            tCtx.font = '300 10px "Noto Sans SC", sans-serif';
            tCtx.fillStyle = 'rgba(15, 15, 15, 0.4)';
            tCtx.letterSpacing = '1px';
            tCtx.fillText('GESTURAL AUDIO DOODLE', 40, logicalHeight - 45);
            tCtx.fillText('声影流形 · 意念留白', 40, logicalHeight - 30);

            tCtx.strokeStyle = 'rgba(239, 68, 68, 0.85)';
            tCtx.lineWidth = 1.5;
            tCtx.strokeRect(logicalWidth - 65, logicalHeight - 50, 22, 22);
            tCtx.fillStyle = 'rgba(239, 68, 68, 0.85)';
            tCtx.font = '900 11px sans-serif';
            tCtx.fillText('声', logicalWidth - 60, logicalHeight - 35);
            tCtx.restore();

            const link = document.createElement('a');
            link.download = `声影流形画作-${Date.now()}.png`;
            link.href = tempCanvas.toDataURL('image/png');
            link.click();
        });

    </script>
</body>
</html>
